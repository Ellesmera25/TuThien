<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1f3a" />
    <title>TuThien.vn</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, rgba(11, 31, 58, 0.1), transparent 40%), #f8fafc;
      }
      .card {
        max-width: 540px;
        width: 100%;
        background: #fff;
        border: 1px solid rgba(100, 116, 139, 0.32);
        border-radius: 0;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }
      .badge {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 0;
        background: rgba(11, 31, 58, 0.08);
        color: #0b1f3a;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 10px;
        font-size: 32px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: #475569;
      }
      code {
        display: block;
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 0;
        background: #f1f5f9;
        color: #0f172a;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Capacitor app shell</span>
      <h1>TuThien.vn Android wrapper</h1>
      <p>
        Đây là trang đệm để Capacitor sinh project Android. Khi phát hành thật,
        hãy đặt <strong>CAPACITOR_SERVER_URL</strong> trỏ đến website đã deploy,
        rồi chạy <strong>npm run cap:sync</strong> và build APK trên máy có Android
        SDK + Java.
      </p>
      <code>Ví dụ: CAPACITOR_SERVER_URL=https://tuthien.vn</code>
    </main>
  </body>
</html>
